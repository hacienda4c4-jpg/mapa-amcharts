<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa epidemiológico cáncer México</title>

<script src="https://cdn.amcharts.com/lib/5/index.js"></script>
<script src="https://cdn.amcharts.com/lib/5/map.js"></script>
<script src="https://cdn.amcharts.com/lib/5/geodata/mexicoLow.js"></script>
<script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
}

#chartdiv {
  width: 100%;
  height: 100vh;
}
</style>
</head>

<body>

<div id="chartdiv"></div>

<script>

am5.ready(function() {

var root = am5.Root.new("chartdiv");

root.setThemes([
  am5themes_Animated.new(root)
]);

var chart = root.container.children.push(
  am5map.MapChart.new(root, {
    projection: am5map.geoMercator()
  })
);

var polygonSeries = chart.series.push(
  am5map.MapPolygonSeries.new(root, {
    geoJSON: am5geodata_mexicoLow
  })
);

polygonSeries.mapPolygons.template.setAll({
  tooltipText: "{name}\nIncidencia: {value}",
  interactive: true,
  strokeWidth: 1
});

polygonSeries.data.setAll([

{ id: "MX-CMX", value: "Alta incidencia" },
{ id: "MX-MEX", value: "Alta incidencia" },
{ id: "MX-JAL", value: "Alta incidencia" },
{ id: "MX-NLE", value: "Alta incidencia" },

{ id: "MX-VER", value: "Media incidencia" },
{ id: "MX-PUE", value: "Media incidencia" },
{ id: "MX-GUA", value: "Media incidencia" },
{ id: "MX-MIC", value: "Media incidencia" },

{ id: "MX-OAX", value: "Baja incidencia" },
{ id: "MX-CHP", value: "Baja incidencia" },
{ id: "MX-GRO", value: "Baja incidencia" }

]);

polygonSeries.mapPolygons.template.adapters.add("fill", function(fill, target) {

var dataItem = target.dataItem;

if (dataItem) {

var value = dataItem.dataContext.value;

if (value === "Alta incidencia") {
  return am5.color(0xd73027);
}

if (value === "Media incidencia") {
  return am5.color(0xfc8d59);
}

if (value === "Baja incidencia") {
  return am5.color(0x91cf60);
}

}

return am5.color(0xd9d9d9);

});

});

</script>

</body>
</html>
